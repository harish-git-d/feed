spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver

  batch:
    jdbc:
      initialize-schema: always   # Auto-create Batch metadata tables in H2

gai:
  source-system-csi:   "161534"
  source-system-name:  "SCEF"
  app-short-name:      "CRC_SCEF"
  region-instance:     "N"
  source-indicator:    "SRC"
  frequency:           "DLY"
  file-type-indicator: "F"
  output-directory:    ./target/test-output
  feed-name:           stress-exposure
  cob-date:            "20251231"
  file-timestamp:      "20260122144002"
  gzip-enabled:        false   # Easier to inspect in tests
  sftp:
    enabled: false
