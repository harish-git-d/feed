spring:
  datasource:
    url:      jdbc:oracle:thin:@:1521/
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10

gai:
  output-directory: ./dev-output
  gzip-enabled: false
  sftp:
    enabled: false
    host:
    port:             22
    username:
    private-key-path: ${SFTP_PRIVATE_KEY_PATH:}
    # Key file received: opiemdv@clmwiemap1d (attached in email)
    known-hosts-path: ${SFTP_KNOWN_HOSTS_PATH:}
    remote-directory:

  notification:
    enabled: false

logging:
  level:
    com.ccc.risk.credit.gai: DEBUG
    org.springframework.batch: DEBUG
    org.springframework.jdbc.core: DEBUG
