spring:
  datasource:
    url: jdbc:oracle:thin:@DEV:1521/
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10

  batch:
    jdbc:
      initialize-schema: always   # Create Batch tables in H2/DEV automatically

gai:
  output-directory: ./dev-output
  sftp:
    enabled: false

logging:
  level:
    com.ccc.risk.credit.gai: DEBUG
    org.springframework.batch: DEBUG
    org.springframework.jdbc: DEBUG
